<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Omni-Read v5.2 | Persistence & Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --primary: #00e5ff; --bg: #050a10; --glass: rgba(255, 255, 255, 0.07); --accent: #ff4757; --start: #2ecc71; --home: #9b59b6; }
        
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        :focus {
            outline: 4px solid var(--primary) !important;
            outline-offset: 4px;
            box-shadow: 0 0 25px var(--primary);
            background: rgba(0, 229, 255, 0.2) !important;
        }

        .top-bar { height: 75px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--primary); gap: 15px; z-index: 10; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        
        .viewer-side { flex: 1.2; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; background: #0c1218; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #pdf-canvas { max-width: 100%; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        
        .read-side { flex: 0.8; background: rgba(0,0,0,0.3); display: flex; flex-direction: column; padding: 20px; }
        #transcript { flex: 1; background: rgba(255,255,255,0.03); border-radius: 15px; padding: 25px; overflow-y: auto; font-size: 1.15rem; line-height: 1.9; border: 1px solid rgba(255,255,255,0.05); }
        
        .word-span { cursor: pointer; transition: 0.2s; border-radius: 3px; padding: 0 2px; display: inline-block; }
        .highlight { background: var(--primary) !important; color: black !important; font-weight: bold; border-radius: 4px; transform: scale(1.1); }
        
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: nowrap; }
        .nav-tools { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 10px; }
        
        button { background: var(--primary); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; transition: 0.3s; color: black; white-space: nowrap; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-home { background: var(--home); color: white; }

        input[type="range"] { accent-color: var(--primary); }
        .info-txt { font-size: 0.7rem; color: var(--primary); opacity: 0.8; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        #page-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--primary);
            color: white;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            width: 45px;
            text-align: center;
            border-radius: 4px;
            padding: 2px;
        }
    </style>
</head>
<body tabindex="-1">

<div class="top-bar">
    
    
    <div class="controls">
        <input type="file" id="upload" accept=".pdf, .png, .jpg" class="nav-item" aria-label="Upload document">
        
        <div class="nav-tools">
            <button id="prev-pg" onclick="changePage(-1)" class="nav-item" aria-label="Previous Page">PREV</button>
            <div style="display: flex; align-items: center; gap: 5px;">
                <span style="font-family: 'Orbitron'; font-size: 0.6rem;">PG</span>
                <input type="number" id="page-input" value="1" min="1" class="nav-item" aria-label="Type page number and press enter" onkeydown="if(event.key === 'Enter') jumpToPage()">
                <span id="page-total" style="font-family: 'Orbitron'; font-size: 0.7rem; opacity: 0.6;">/ 0</span>
            </div>
            <button id="next-pg" onclick="changePage(1)" class="nav-item" aria-label="Next Page">NEXT</button>
        </div>

        <div class="nav-tools">
            <label style="font-size: 0.7rem; font-family: 'Orbitron';">SPD</label>
            <input type="range" id="speed" min="0.5" max="1.8" step="0.1" value="1.0" style="width: 60px;" class="nav-item" aria-label="Reading Speed">
        </div>
        
        <button id="start-btn" onclick="resumeAtWord()" style="background:var(--start); color:white;" class="nav-item" aria-label="Start Human Reading">START</button>
        <button id="stop-btn" onclick="stopReading()" style="background:var(--accent); color:white;" class="nav-item" aria-label="Stop Reading">STOP</button>
    </div>
</div>

<div class="main-content">
    <div class="viewer-side"><canvas id="pdf-canvas"></canvas></div>
    <div class="read-side">
        <div id="transcript">Upload a document to begin.</div>
        <div class="info-txt" id="status-info">SYSTEM IDLE</div>
    </div>
</div>

<script>
    const transcriptDiv = document.getElementById('transcript');
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    
    let pdfDoc = null, pageNum = 1, wordsArray = [], currentWordIndex = 0, currentFileName = "";
    let synth = window.speechSynthesis, currentNavIndex = -1;

    function speakUI(text) {
        const feedback = new SpeechSynthesisUtterance(text);
        feedback.rate = 1.8;
        synth.cancel(); 
        synth.speak(feedback);
    }

    // --- FIXED PAGE SEARCH LOGIC ---
    function jumpToPage() {
        const input = document.getElementById('page-input');
        const targetPage = parseInt(input.value);
        
        if (pdfDoc && targetPage >= 1 && targetPage <= pdfDoc.numPages) {
            stopReading();
            renderPage(targetPage);
            speakUI("Jumping to page " + targetPage);
            input.blur(); // Remove focus after jumping
        } else {
            input.value = pageNum;
            speakUI("Page out of range");
        }
    }

    // --- REMEMBERING LOGIC ---
    function saveProgress(p) {
        if (currentFileName) {
            localStorage.setItem('lastPage_' + currentFileName, p);
        }
    }

    window.addEventListener('keydown', (e) => {
        const navItems = document.querySelectorAll('.nav-item');
        const speedInput = document.getElementById('speed');

        if (document.activeElement === document.getElementById('page-input')) return;

        if (e.key === "ArrowRight") {
            e.preventDefault();
            currentNavIndex = (currentNavIndex + 1) % navItems.length;
            navItems[currentNavIndex].focus();
            speakUI(navItems[currentNavIndex].getAttribute('aria-label'));
        } 
        else if (e.key === "ArrowLeft") {
            e.preventDefault();
            currentNavIndex = (currentNavIndex - 1 + navItems.length) % navItems.length;
            navItems[currentNavIndex].focus();
            speakUI(navItems[currentNavIndex].getAttribute('aria-label'));
        }
        else if (e.key === "ArrowUp") {
            e.preventDefault();
            speedInput.value = (parseFloat(speedInput.value) + 0.1).toFixed(1);
            speakUI("Speed " + speedInput.value);
            if (synth.speaking) resumeAtWord();
        }
        else if (e.key === "ArrowDown") {
            e.preventDefault();
            speedInput.value = (parseFloat(speedInput.value) - 0.1).toFixed(1);
            speakUI("Speed " + speedInput.value);
            if (synth.speaking) resumeAtWord();
        }
        else if (e.key === "Enter" || e.key === " ") {
            if (currentNavIndex !== -1) {
                e.preventDefault();
                navItems[currentNavIndex].click();
            }
        }
    });

    function stopReading() {
        synth.cancel();
        document.getElementById('status-info').innerText = "PAUSED";
    }

    function resumeAtWord() {
        jumpToWord(currentWordIndex);
    }

    function jumpToWord(index) {
        synth.cancel();
        currentWordIndex = index;
        const fullText = wordsArray.slice(index).join(" ");
        const utterance = new SpeechSynthesisUtterance(fullText);
        utterance.rate = document.getElementById('speed').value;

        let lastHighlightIndex = index;
        utterance.onboundary = (event) => {
            if (event.name === 'word') {
                const currentText = event.utterance.text;
                const wordSoFar = currentText.substring(0, event.charIndex + event.charLength);
                const wordCount = wordSoFar.trim().split(/\s+/).length;
                const highlightTarget = index + wordCount - 1;

                if (highlightTarget !== lastHighlightIndex) {
                    document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
                    const targetEl = document.getElementById(`word-${highlightTarget}`);
                    if (targetEl) {
                        targetEl.classList.add('highlight');
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        currentWordIndex = highlightTarget;
                        lastHighlightIndex = highlightTarget;
                    }
                }
            }
        };

        utterance.onstart = () => document.getElementById('status-info').innerText = "READING ACTIVE";
        utterance.onend = () => document.getElementById('status-info').innerText = "FINISHED";
        synth.speak(utterance);
    }

    document.getElementById('upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name;
        document.getElementById('status-info').innerText = "LOADING...";

        if (file.type === "application/pdf") {
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
                document.getElementById('page-total').innerText = "/ " + pdfDoc.numPages;
                
                // Check memory
                const saved = localStorage.getItem('lastPage_' + currentFileName);
                if (saved) {
                    speakUI("Resuming from page " + saved);
                    renderPage(parseInt(saved));
                } else {
                    renderPage(1);
                }
            };
            reader.readAsArrayBuffer(file);
        } else {
            Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
                prepareTranscript(text);
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                img.src = URL.createObjectURL(file);
            });
        }
    });

    async function renderPage(num) {
        if (!pdfDoc) return;
        pageNum = num;
        document.getElementById('page-input').value = num;
        saveProgress(num);
        
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.width = viewport.width; canvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        
        const textContent = await page.getTextContent();
        const rawText = textContent.items.map(s => s.str).join(" ");
        prepareTranscript(rawText);
        
        document.getElementById('prev-pg').disabled = (num <= 1);
        document.getElementById('next-pg').disabled = (num >= pdfDoc.numPages);
    }

    function changePage(delta) {
        stopReading();
        renderPage(pageNum + delta);
        speakUI("Page " + pageNum);
    }

    function prepareTranscript(text) {
        const cleanedText = text.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/\s+/g, ' ').trim();
        wordsArray = cleanedText.split(' ');
        transcriptDiv.innerHTML = wordsArray.map((word, i) => 
            `<span class="word-span" id="word-${i}" onclick="jumpToWord(${i})">${word}</span>`
        ).join(" ");
        currentWordIndex = 0;
    }
</script>
</body>
</html>
