<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>Omni-Engine v12.0 | Professional Edition</title>
    
    <style>
        /* STYLING BLOCK 
           Maintains the Glassmorphism design and high-contrast UI.
        */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        
        :root { 
            --primary: #00e5ff; 
            --accent: #ff4757; 
            --bg: #050a10; 
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            background: var(--bg) !important; 
            color: white !important; 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px;
            overflow-x: hidden;
        }

        /* Prevent auto-switching to light mode */
        @media (prefers-color-scheme: light) {
            body { background: var(--bg) !important; color: white !important; }
        }

        .calc-wrap { 
            width: 100%; 
            max-width: 500px; 
            background: var(--glass); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); 
            border-radius: 40px; 
            padding: 30px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header-row {
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            align-items: center;
        }

        .version-tag {
            font-family: 'Orbitron'; 
            color: var(--primary); 
            font-size: 0.65rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .display-box { 
            background: rgba(0,0,0,0.7); 
            padding: 30px; 
            border-radius: 24px; 
            text-align: right; 
            margin-bottom: 25px; 
            border-right: 5px solid var(--primary); 
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        #screen { 
            font-size: 2.4rem; 
            font-family: 'Orbitron'; 
            color: var(--primary); 
            word-break: break-all; 
            line-height: 1.2;
        }

        #history-subtext {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            margin-top: 5px;
            font-family: 'Orbitron';
        }

        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
        }

        button { 
            padding: 22px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.08); 
            background: rgba(255,255,255,0.04); 
            color: white; 
            cursor: pointer; 
            font-family: 'Orbitron'; 
            transition: 0.3s; 
            font-size: 0.9rem; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active { transform: scale(0.92); }
        button:hover { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

        #voiceBtn { 
            width: 150px; 
            font-size: 0.7rem; 
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--primary);
        }

        .listening-active { 
            background: var(--accent) !important; 
            color: white !important; 
            border: 1px solid white !important;
            animation: pulse-border 1.5s infinite; 
        }

        @keyframes pulse-border { 
            0% { box-shadow: 0 0 0px var(--accent); } 
            50% { box-shadow: 0 0 25px var(--accent); } 
            100% { box-shadow: 0 0 0px var(--accent); } 
        }

        /* Graphing Elements */
        #graphCanvas { 
            width: 100%; 
            height: 0; 
            background: #000; 
            border-radius: 25px; 
            margin-top: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.3); 
            transition: height 0.6s ease; 
            display: none; 
        }

        .full-graph #graphCanvas { height: 320px; display: block; }

        #exit-btn { 
            display: none; 
            width: 100%; 
            margin-top: 15px; 
            background: var(--accent); 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            font-family: 'Orbitron'; 
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="calc-wrap" id="main-container">
    <div class="header-row">
        <span class="version-tag">Omni-Engine v12.0</span>
        <button id="voiceBtn" onclick="toggleVoice()">🎤 START MIC</button>
    </div>

    <div class="display-box">
        <div id="screen">0</div>
        <div id="history-subtext">Memory: 0</div>
    </div>

    <div class="btn-grid">
        <button onclick="clearAll()">AC</button>
        <button onclick="handlePaste()" style="color:var(--primary)">PASTE</button>
        <button onclick="handleCopy()">COPY</button>
        <button onclick="insert('/')">÷</button>
        <button class="nav-item" onclick="insert('**')">^</button>
        <button onclick="insert('7')">7</button><button onclick="insert('8')">8</button><button onclick="insert('9')">9</button>
        <button onclick="insert('*')">×</button>
        
        <button onclick="insert('4')">4</button><button onclick="insert('5')">5</button><button onclick="insert('6')">6</button>
        <button onclick="insert('-')">−</button>
        
        <button onclick="insert('1')">1</button><button onclick="insert('2')">2</button><button onclick="insert('3')">3</button>
        <button onclick="insert('+')">+</button>
        
        <button style="color: var(--primary)" onclick="insert('x')">x</button>
        <button onclick="insert('0')">0</button>
        <button onclick="insert('.')">.</button>
        <button onclick="backspace()">⌫</button>
        
        <button id="calcBtn" style="grid-column: span 4; background:var(--primary); color:black;" onclick="calculate()">CALCULATE & ANALYZE</button>
    </div>

    <canvas id="graphCanvas"></canvas>
    <button id="exit-btn" onclick="exitFull()">EXIT GRAPH VIEW</button>
</div>

<script>
    /* CORE LOGIC BLOCK
       Handles calculation, voice recognition, and geometric analysis.
    */
    let expression = "";
    let lastResult = "0";
    let isListening = false;
    let recognition;
    const synth = window.speechSynthesis;
    const screenEl = document.getElementById("screen");
    const historyEl = document.getElementById("history-subtext");

    // Initialize Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) { 
                transcript += event.results[i][0].transcript; 
            }
            processVoiceInput(transcript);
        };
        
        recognition.onerror = () => {
            stopMic();
            speak("Microphone error. Please try again.");
        };
    }

    function speak(text) {
        synth.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.0;
        msg.pitch = 1.0;
        synth.speak(msg);
    }

    function toggleVoice() {
        if (!isListening) {
            expression = "";
            recognition.start();
            isListening = true;
            document.getElementById("voiceBtn").innerText = "STOP & SOLVE";
            document.getElementById("voiceBtn").classList.add('listening-active');
            // FEATURE: Silent Start (No speak call here)
        } else {
            stopMic();
            setTimeout(calculate, 500);
        }
    }

    function stopMic() { 
        recognition.stop(); 
        isListening = false; 
        document.getElementById("voiceBtn").innerText = "🎤 START MIC"; 
        document.getElementById("voiceBtn").classList.remove('listening-active'); 
    }

    function processVoiceInput(text) {
        let input = text.toLowerCase();
        
        // Command Layer
        if (input.includes("copy this") || input.includes("copy result")) { handleCopy(); return; }
        if (input.includes("paste this") || input.includes("paste that")) { handlePaste(); return; }
        if (input.match(/calculate|solve|plot|go|done/)) { stopMic(); setTimeout(calculate, 400); return; }
        if (input.match(/clear|reset|delete/)) { clearAll(); return; }

        // Memory Layer: Detects "the answer", "that", "last result"
        input = input.replace(/the answer|last result|that/g, lastResult);
        
        // Conversational Filter
        input = input.replace(/what is|how much is|is|the|result|equals|please|can you/g, "");
        
        // Math Phrase Mapping
        const map = { 
            "plus":"+", "minus":"-", "times":"*", "into":"*", "multiplied by":"*",
            "divided by":"/", "over":"/", "squared":"**2", "cubed":"**3", 
            "to the power of":"**", "logarithm":"Math.log10(", "natural log":"Math.log(", 
            "square root":"Math.sqrt(", "x":"x", "point":".", "decimal":"."
        };
        
        Object.keys(map).forEach(key => {
            input = input.replace(new RegExp(key, "g"), map[key]);
        });
        
        // Final Parsing
        expression = input.replace(/[^0-9+\-*/.**()xMath.log(10)sqrt]/g, "");
        updateUI();
    }

    function updateUI() {
        screenEl.innerText = expression.replace(/Math\.log10\(/g, 'log(')
                                      .replace(/Math\.log\(/g, 'ln(')
                                      .replace(/Math\.sqrt\(/g, '√(')
                                      .replace(/\*\*/g, '^') || "0";
        historyEl.innerText = `Memory: ${lastResult}`;
    }

    function insert(v) { expression += v; updateUI(); }
    function backspace() { expression = expression.slice(0, -1); updateUI(); }
    function clearAll() { expression = ""; updateUI(); exitFull(); speak("System reset."); }
    
    async function handleCopy() { 
        const toCopy = lastResult !== "0" ? lastResult : expression;
        await navigator.clipboard.writeText(toCopy); 
        speak("I have copied " + toCopy + " to your clipboard."); 
    }
    
    async function handlePaste() { 
        try {
            const t = await navigator.clipboard.readText(); 
            expression += t.replace(/[^0-9+\-*/.**()x]/g, ""); 
            updateUI();
            speak("Pasted data."); 
        } catch(e) { speak("Error accessing clipboard."); }
    }

    // --- GEOMETRIC INTELLIGENCE LAYER ---
    function calculate() {
        if (!expression) return;
        
        if (expression.includes('x')) {
            const analysis = performGeometricAnalysis();
            speak(analysis);
            plotGraph();
        } else {
            try {
                // Auto-close brackets
                let open = (expression.match(/\(/g) || []).length;
                let close = (expression.match(/\)/g) || []).length;
                while (open > close) { expression += ")"; close++; }

                const res = eval(expression);
                speak("The answer is " + res);
                lastResult = res.toString();
                expression = lastResult;
                updateUI();
            } catch(e) { speak("I could not process that math expression."); }
        }
    }

    function performGeometricAnalysis() {
        try {
            // Sample points for behavior
            const yFarLeft = eval(expression.replace(/x/g, "(-1000)"));
            const yLeft = eval(expression.replace(/x/g, "(-10)"));
            const yCenter = eval(expression.replace(/x/g, "(0)"));
            const yRight = eval(expression.replace(/x/g, "(10)"));
            const yFarRight = eval(expression.replace(/x/g, "(1000)"));

            let report = "Analyzing graph. ";
            
            // Log/Sqrt check
            if (expression.includes("Math.log") || expression.includes("sqrt")) {
                return "This is a restricted domain function. It only exists for positive x values and flattens out as it moves right.";
            }

            // Arm Analysis
            const leftArmUp = yFarLeft > yLeft;
            const rightArmUp = yFarRight > yRight;

            if (leftArmUp && rightArmUp) {
                report += "Both arms point up to positive infinity, forming an even power bowl shape. ";
            } else if (!leftArmUp && !rightArmUp) {
                report += "Both arms point down to negative infinity, forming a downward even power shape. ";
            } else if (!leftArmUp && rightArmUp) {
                report += "The left arm points down and the right arm points up. This is a typical odd power or linear curve. ";
            } else {
                report += "The left arm points up and the right arm points down. This is an inverted odd power curve. ";
            }

            report += `The vertical intercept is at ${yCenter.toFixed(1)}.`;
            return report;
        } catch(e) { return "This is a complex geometric function."; }
    }

    function plotGraph() {
        const container = document.getElementById('main-container');
        const canvas = document.getElementById("graphCanvas");
        const exit = document.getElementById("exit-btn");
        
        container.classList.add('full-graph');
        exit.style.display = 'block';
        
        canvas.width = canvas.offsetWidth; 
        canvas.height = 320;
        const ctx = canvas.getContext("2d"), w = canvas.width, h = canvas.height;
        const scale = 35; // Pixels per unit

        ctx.clearRect(0, 0, w, h);
        
        // Draw Grid lines
        ctx.strokeStyle = "rgba(0, 229, 255, 0.1)";
        ctx.lineWidth = 1;
        for(let i=0; i<w; i+=scale) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); }
        for(let j=0; j<h; j+=scale) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(w,j); ctx.stroke(); }

        // Draw Axis
        ctx.strokeStyle = "rgba(0, 229, 255, 0.4)";
        ctx.lineWidth = 2;
        ctx.beginPath(); 
        ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); // X-Axis
        ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); // Y-Axis
        ctx.stroke();

        // Draw Function
        ctx.strokeStyle = "white"; 
        ctx.lineWidth = 4; 
        ctx.beginPath();
        
        let firstPoint = true;
        for(let i=0; i<w; i++) {
            let xVal = (i - w/2) / scale;
            try {
                let yVal = eval(expression.replace(/x/g, `(${xVal})`));
                let py = h/2 - (yVal * scale);
                
                if (!isNaN(py) && isFinite(py)) {
                    if (firstPoint) {
                        ctx.moveTo(i, py);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(i, py);
                    }
                }
            } catch(e) {}
        }
        ctx.stroke();
    }

    function exitFull() { 
        document.getElementById('main-container').classList.remove('full-graph'); 
        document.getElementById('exit-btn').style.display = 'none'; 
    }
</script>
</body>
</html>
