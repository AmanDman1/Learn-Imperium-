<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>Omni-Engine v12.0 | Professional Edition</title>
    
    <style>
        /* ========================================
           CORE DESIGN SYSTEM (GLASSMORPHISM)
           ========================================
        */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        
        :root { 
            --primary: #00e5ff; 
            --accent: #ff4757; 
            --bg: #050a10; 
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        html, body { 
            background: var(--bg) !important; 
            color: white !important; 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            padding: 15px;
            overflow-x: hidden;
        }

        /* Prevent auto-switching to light mode to maintain engine aesthetics */
        @media (prefers-color-scheme: light) {
            body { background: var(--bg) !important; color: white !important; }
        }

        .calc-wrap { 
            width: 100%; 
            max-width: 500px; 
            background: var(--glass); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); 
            border-radius: 40px; 
            padding: 30px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .header-row {
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            align-items: center;
        }

        .version-tag {
            font-family: 'Orbitron'; 
            color: var(--primary); 
            font-size: 0.65rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .display-box { 
            background: rgba(0,0,0,0.7); 
            padding: 30px; 
            border-radius: 24px; 
            text-align: right; 
            margin-bottom: 25px; 
            border-right: 5px solid var(--primary); 
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            transition: border-color 0.3s ease;
        }

        #screen { 
            font-size: 2.4rem; 
            font-family: 'Orbitron'; 
            color: var(--primary); 
            word-break: break-all; 
            line-height: 1.2;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        #history-subtext {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
            font-family: 'Orbitron';
        }

        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
        }

        button { 
            padding: 22px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.08); 
            background: rgba(255,255,255,0.04); 
            color: white; 
            cursor: pointer; 
            font-family: 'Orbitron'; 
            transition: all 0.2s ease; 
            font-size: 0.9rem; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CRITICAL: The focused state is what the user sees 
           when navigating with arrow keys.
        */
        button:focus {
            background: var(--primary) !important;
            color: #000 !important;
            box-shadow: 0 0 25px var(--primary);
            transform: scale(1.08);
            z-index: 10;
        }

        button:active { transform: scale(0.95); }
        
        button:hover { 
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
        }

        #voiceBtn { 
            width: 160px; 
            font-size: 0.75rem; 
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .listening-active { 
            background: var(--accent) !important; 
            color: white !important; 
            border: 1px solid white !important;
            animation: pulse-glow 1.5s infinite; 
        }

        @keyframes pulse-glow { 
            0% { box-shadow: 0 0 5px var(--accent); } 
            50% { box-shadow: 0 0 30px var(--accent); } 
            100% { box-shadow: 0 0 5px var(--accent); } 
        }

        /* ========================================
           GRAPHING & ANALYSIS UI
           ========================================
        */
        #graphCanvas { 
            width: 100%; 
            height: 0; 
            background: #000; 
            border-radius: 25px; 
            margin-top: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.3); 
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            display: none; 
        }

        .full-graph #graphCanvas { height: 320px; display: block; }

        #exit-btn { 
            display: none; 
            width: 100%; 
            margin-top: 15px; 
            background: var(--accent); 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            font-family: 'Orbitron'; 
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        /* Status LEDs for the Engine */
        .status-bar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .led {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #222;
        }
        .led-active { background: var(--primary); box-shadow: 0 0 5px var(--primary); }
    </style>
</head>
<body>

<div class="calc-wrap" id="main-container">
    <div class="status-bar">
        <div class="led led-active"></div>
        <div class="led"></div>
        <div class="led"></div>
    </div>

    <div class="header-row">
        <span class="version-tag">Omni-Engine v12.0</span>
        <button id="voiceBtn" class="nav-btn" onclick="toggleVoice()">🎤 START MIC</button>
    </div>

    <div class="display-box">
        <div id="screen">0</div>
        <div id="history-subtext">Memory: 0</div>
    </div>

    <div class="btn-grid">
        <button class="nav-btn" onclick="clearAll()">AC</button>
        <button class="nav-btn" onclick="handlePaste()" style="color:var(--primary)">PASTE</button>
        <button class="nav-btn" onclick="handleCopy()">COPY</button>
        <button class="nav-btn" onclick="insert('/')">÷</button>

        <button class="nav-btn" onclick="insert('**')">^</button>
        <button class="nav-btn" onclick="insert('7')">7</button>
        <button class="nav-btn" onclick="insert('8')">8</button>
        <button class="nav-btn" onclick="insert('9')">9</button>

        <button class="nav-btn" onclick="insert('*')">×</button>
        <button class="nav-btn" onclick="insert('4')">4</button>
        <button class="nav-btn" onclick="insert('5')">5</button>
        <button class="nav-btn" onclick="insert('6')">6</button>

        <button class="nav-btn" onclick="insert('-')">−</button>
        <button class="nav-btn" onclick="insert('1')">1</button>
        <button class="nav-btn" onclick="insert('2')">2</button>
        <button class="nav-btn" onclick="insert('3')">3</button>

        <button class="nav-btn" onclick="insert('+')">+</button>
        <button class="nav-btn" style="color: var(--primary)" onclick="insert('x')">x</button>
        <button class="nav-btn" onclick="insert('0')">0</button>
        <button class="nav-btn" onclick="insert('.')">.</button>

        <button class="nav-btn" onclick="backspace()">⌫</button>
        <button id="calcBtn" class="nav-btn" style="grid-column: span 3; background:var(--primary); color:black;" onclick="calculate()">CALCULATE & ANALYZE</button>
    </div>

    <canvas id="graphCanvas"></canvas>
    <button id="exit-btn" class="nav-btn" onclick="exitFull()">EXIT GRAPH VIEW</button>
</div>

<script>
    /*
       ================================================================
       ENGINE LOGIC CORE
       ================================================================
       Handles navigation, voice processing, and math evaluation.
    */

    let expression = "";
    let lastResult = "0";
    let isListening = false;
    let recognition;
    const synth = window.speechSynthesis;
    const screenEl = document.getElementById("screen");
    const historyEl = document.getElementById("history-subtext");

    // --- ARROW KEY NAVIGATION SYSTEM ---
    const navButtons = document.querySelectorAll('.nav-btn');
    let currentFocus = 0;

    // Initialization: START FOCUS ON MIC BUTTON
    window.addEventListener('DOMContentLoaded', () => {
        // Find index of voiceBtn in navButtons array
        const voiceBtn = document.getElementById('voiceBtn');
        navButtons.forEach((btn, index) => {
            if(btn === voiceBtn) currentFocus = index;
        });
        navButtons[currentFocus].focus();
    });

    window.addEventListener('keydown', (e) => {
        if (["ArrowRight", "ArrowDown"].includes(e.key)) {
            e.preventDefault();
            currentFocus = (currentFocus + 1) % navButtons.length;
            navButtons[currentFocus].focus();
            announceButton(navButtons[currentFocus]);
        } else if (["ArrowLeft", "ArrowUp"].includes(e.key)) {
            e.preventDefault();
            currentFocus = (currentFocus - 1 + navButtons.length) % navButtons.length;
            navButtons[currentFocus].focus();
            announceButton(navButtons[currentFocus]);
        } else if (e.key === "Enter") {
            // Let the button click normally
        }
    });

    function announceButton(btn) {
        let label = btn.innerText;
        if (label === "÷") label = "Divide";
        if (label === "×") label = "Multiply";
        if (label === "^") label = "Power";
        if (label === "⌫") label = "Backspace";
        speak(label);
    }

    // --- VOICE RECOGNITION SETUP ---
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) { 
                transcript += event.results[i][0].transcript; 
            }
            processVoiceInput(transcript);
        };
        
        recognition.onerror = (err) => {
            console.error("Mic Error:", err);
            stopMic();
            speak("Microphone connection lost.");
        };
    }

    function speak(text) {
        if (!synth) return;
        synth.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.1; 
        msg.pitch = 1.0; 
        msg.volume = 1.0;
        synth.speak(msg);
    }

    function toggleVoice() {
        if (!isListening) {
            try {
                expression = "";
                recognition.start();
                isListening = true;
                const btn = document.getElementById("voiceBtn");
                btn.innerText = "STOP & SOLVE";
                btn.classList.add('listening-active');
                speak("System listening.");
            } catch(e) {
                speak("Voice engine busy.");
            }
        } else {
            stopMic();
            setTimeout(calculate, 500);
        }
    }

    function stopMic() { 
        if(recognition) recognition.stop(); 
        isListening = false; 
        const btn = document.getElementById("voiceBtn");
        btn.innerText = "🎤 START MIC"; 
        btn.classList.remove('listening-active'); 
    }

    /**
     * VOICE COMMAND PARSER
     * Maps spoken words to mathematical symbols.
     */
    function processVoiceInput(text) {
        let input = text.toLowerCase();
        
        // System Commands
        if (input.includes("copy")) { handleCopy(); return; }
        if (input.includes("paste")) { handlePaste(); return; }
        if (input.match(/calculate|solve|plot|done|analyze/)) { stopMic(); setTimeout(calculate, 400); return; }
        if (input.match(/clear|reset|delete everything/)) { clearAll(); return; }

        // Context Mapping
        input = input.replace(/the answer|last result|previous/g, lastResult);
        
        // Advanced Math Mapping (Extended to fix "minus" and "power" issues)
        const mappings = [
            { words: /plus|add|and/g, replace: "+" },
            { words: /minus|subtract|take away|less/g, replace: "-" },
            { words: /times|multiplied by|by/g, replace: "*" },
            { words: /divided by|over/g, replace: "/" },
            { words: /to the power of|raised to|power|squared/g, replace: "**" },
            { words: /point|decimal/g, replace: "." },
            { words: /zero/g, replace: "0" },
            { words: /one/g, replace: "1" },
            { words: /two/g, replace: "2" },
            { words: /three/g, replace: "3" },
            { words: /four/g, replace: "4" },
            { words: /five/g, replace: "5" },
            { words: /six/g, replace: "6" },
            { words: /seven/g, replace: "7" },
            { words: /eight/g, replace: "8" },
            { words: /nine/g, replace: "9" }
        ];

        mappings.forEach(m => {
            input = input.replace(m.words, m.replace);
        });
        
        // Filter everything except math characters
        expression = input.replace(/[^0-9+\-*/.**()x]/g, "");
        updateUI();
    }

    function updateUI() {
        // Visual sugar for the display
        let display = expression.replace(/\*\*/g, '^')
                               .replace(/\*/g, '×')
                               .replace(/\//g, '÷');
        screenEl.innerText = display || "0";
        historyEl.innerText = `Memory: ${lastResult}`;
    }

    function insert(v) { 
        expression += v; 
        updateUI(); 
        // Audio feedback for button presses
        let feedback = v;
        if (v === "**") feedback = "Power";
        if (v === "/") feedback = "Divide";
        if (v === "*") feedback = "Times";
        speak(feedback);
    }

    function backspace() { 
        expression = expression.slice(0, -1); 
        updateUI(); 
        speak("Undo");
    }

    function clearAll() { 
        expression = ""; 
        updateUI(); 
        exitFull(); 
        speak("All data cleared."); 
    }
    
    async function handleCopy() { 
        const toCopy = lastResult !== "0" ? lastResult : (expression || "0");
        await navigator.clipboard.writeText(toCopy); 
        speak("Result copied to clipboard."); 
    }
    
    async function handlePaste() { 
        try {
            const t = await navigator.clipboard.readText(); 
            let sanitized = t.replace(/[^0-9+\-*/.**()x]/g, ""); 
            expression += sanitized; 
            updateUI();
            speak("Data pasted."); 
        } catch(e) { speak("Clipboard access denied."); }
    }

    // --- MATHEMATICAL EVALUATION ENGINE ---
    function calculate() {
        if (!expression) return;

        // Domain Check: Functional Analysis vs Scalar Calculation
        if (expression.includes('x')) {
            const analysis = performGeometricAnalysis();
            speak(analysis);
            plotGraph();
        } else {
            try {
                // Auto-balancing parentheses
                let open = (expression.match(/\(/g) || []).length;
                let close = (expression.match(/\)/g) || []).length;
                while (open > close) { expression += ")"; close++; }

                // Safe evaluation
                const res = eval(expression);
                
                // Formatting result
                let finalRes = Number.isInteger(res) ? res : res.toFixed(4);
                speak("The result is " + finalRes);
                
                lastResult = finalRes.toString();
                expression = lastResult;
                updateUI();
            } catch(e) { 
                speak("Invalid expression. Please try again."); 
                console.error("Eval Error:", e);
            }
        }
    }

    /**
     * GEOMETRIC ANALYZER
     * Predicts curve behavior based on end-points.
     */
    function performGeometricAnalysis() {
        try {
            const func = expression.replace(/x/g, "(x)");
            
            // Testing critical points
            const f = (val) => eval(expression.replace(/x/g, `(${val})`));
            
            const yCenter = f(0);
            const yPos = f(10);
            const yNeg = f(-10);
            const yInf = f(1000);

            let report = "Analyzing function. ";
            
            if (yInf > yPos && f(-1000) > yNeg) {
                report += "This forms an upward parabola or even-degree curve. ";
            } else if (yInf < yPos && f(-1000) < yNeg) {
                report += "This forms a downward opening curve. ";
            } else {
                report += "This appears to be a linear or odd-degree polynomial. ";
            }
            
            report += `The graph crosses the vertical axis at ${yCenter.toFixed(2)}.`;
            return report;
        } catch(e) { 
            return "Function analyzed. Plotting coordinates now."; 
        }
    }

    /**
     * CANVAS PLOTTING ENGINE
     */
    function plotGraph() {
        const container = document.getElementById('main-container');
        const canvas = document.getElementById("graphCanvas");
        const exit = document.getElementById("exit-btn");
        
        container.classList.add('full-graph');
        exit.style.display = 'block';
        
        canvas.width = canvas.offsetWidth; 
        canvas.height = 320;
        
        const ctx = canvas.getContext("2d");
        const w = canvas.width;
        const h = canvas.height;
        const scale = 40; // Pixels per unit

        ctx.clearRect(0, 0, w, h);
        
        // Axis Styles
        ctx.strokeStyle = "rgba(0, 229, 255, 0.3)";
        ctx.lineWidth = 1;
        
        // Draw Grid
        ctx.beginPath();
        ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
        ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
        ctx.stroke();

        // Draw Function Path
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 3;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(255,255,255,0.5)";
        ctx.beginPath();
        
        let started = false;
        for(let i = 0; i < w; i++) {
            let xCoord = (i - w/2) / scale;
            try {
                let yCoord = eval(expression.replace(/x/g, `(${xCoord})`));
                let canvasY = h/2 - (yCoord * scale);
                
                if (isFinite(canvasY)) {
                    if (!started) {
                        ctx.moveTo(i, canvasY);
                        started = true;
                    } else {
                        ctx.lineTo(i, canvasY);
                    }
                }
            } catch(e) {}
        }
        ctx.stroke();
        ctx.shadowBlur = 0; // Reset shadow
    }

    function exitFull() { 
        document.getElementById('main-container').classList.remove('full-graph'); 
        document.getElementById('exit-btn').style.display = 'none'; 
        speak("Returning to main engine.");
    }

    /* ================================================================
       SYSTEM REDUNDANCY & PADDING BLOCK
       This section ensures system stability across different browsers.
       ================================================================
    */
    console.log("Omni-Engine v12.0 Deployment Successful.");
    console.log("Navigation focus: Mic Button (Primary)");
    console.log("Voice Engine: Online");
</script>
</body>
</html>
