<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>Imperium Analytical Core v25.0 | Precision Geometry</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --cyan: #00e5ff; 
            --red: #ff4757;
            --gold: #ffc107;
            --green: #2ed573;
            --bg-dark: #010204; 
            --bg-panel: #0d1117;
            --glass: rgba(255, 255, 255, 0.04); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { 
            box-sizing: border-box; 
            outline: none; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0;
        }

        body { 
            background-color: var(--bg-dark); 
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(255, 71, 87, 0.05) 0%, transparent 50%);
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        /* MAIN CALCULATOR FRAME */
        .calculator-wrapper { 
            width: 100%; 
            max-width: 1100px; 
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 25px;
            background: var(--bg-panel); 
            border: 1px solid var(--glass-border); 
            border-radius: 32px; 
            padding: 35px; 
            box-shadow: 0 50px 150px rgba(0,0,0,0.9);
            position: relative;
            backdrop-filter: blur(20px);
        }

        /* HUD TOP BAR */
        .system-status-bar {
            position: absolute;
            top: 15px;
            left: 35px;
            right: 35px;
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            z-index: 10;
        }

        .status-node { display: flex; align-items: center; gap: 8px; }
        .pulse { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* GRAPH VIEWPORT */
        .viewport-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .canvas-wrapper {
            width: 100%; 
            height: 450px;
            background: #000; 
            border-radius: 24px;
            position: relative; 
            overflow: hidden;
            border: 1px solid var(--glass-border);
            cursor: crosshair;
        }

        canvas { width: 100%; height: 100%; }

        /* CHANNEL HUD */
        .hud-overlay {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            pointer-events: none; 
            z-index: 5;
        }

        .channel-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .channel-card {
            padding: 12px 20px;
            border-radius: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.85);
            border-left: 4px solid transparent;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            min-width: 220px;
        }

        #card-a { border-color: var(--cyan); color: var(--cyan); }
        #card-b { border-color: var(--red); color: var(--red); opacity: 0.3; transform: scale(0.95); transform-origin: left; }
        
        .card-active { opacity: 1 !important; transform: scale(1) translateX(10px) !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* TELEMETRY ANALYTICS */
        .telemetry-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .telemetry-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--gold);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .telemetry-data { display: flex; flex-direction: column; gap: 15px; }

        .data-block { display: flex; flex-direction: column; gap: 5px; }
        .label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .value { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--text-main); }

        /* KEYPAD GRID & NAVIGATION */
        .controls-panel { display: flex; flex-direction: column; gap: 15px; }

        .top-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .grid-keypad { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
        }

        .btn { 
            background: var(--glass);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 16px; 
            padding: 22px 5px;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-3px); }
        .btn:focus { 
            background: var(--text-main) !important; 
            color: var(--bg-dark) !important; 
            transform: scale(1.05); 
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
            z-index: 20;
        }

        .btn-sci { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: #a29bfe; }
        .btn-op { color: var(--gold); font-size: 1.4rem; }
        .btn-ac { color: var(--red); }
        
        .btn-primary { 
            background: rgba(0, 229, 255, 0.1); 
            border-color: var(--cyan); 
            color: var(--cyan); 
            font-size: 0.7rem; 
            font-family: 'Orbitron', sans-serif;
            padding: 15px;
        }

        /* SCROLLBAR & SCALING */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        @media (max-width: 950px) {
            .calculator-wrapper { grid-template-columns: 1fr; }
            .canvas-wrapper { height: 350px; }
        }
    </style>
</head>
<body>

    <div class="calculator-wrapper">
        <div class="system-status-bar">
            <div class="status-node"><div class="pulse"></div> CORE_STABLE</div>
            <div id="chrono-clock">TIME: 00:00:00</div>
            <div class="status-node">PRECISION: SUB_PX</div>
        </div>

        <div class="viewport-container">
            <div class="canvas-wrapper" id="canvas-frame">
                <div class="hud-overlay">
                    <div class="channel-info">
                        <div id="card-a" class="channel-card card-active">
                            CH_ALPHA: <span id="disp-a">y = 0</span>
                        </div>
                        <div id="card-b" class="channel-card">
                            CH_BETA: <span id="disp-b">y = 0</span>
                        </div>
                    </div>
                </div>
                <canvas id="mainCanvas"></canvas>
            </div>

            <div class="telemetry-panel">
                <div class="telemetry-header">
                    GEOMETRIC TELEMETRY
                    <span id="coord-voice-tag" style="font-size:0.6rem; color:var(--cyan)">COORDINATE_VOICE_READY</span>
                </div>
                
                <div class="telemetry-data">
                    <div class="data-block">
                        <span class="label">Primary Signature (A)</span>
                        <span class="value" id="tele-a" style="color:var(--cyan)">Scanning...</span>
                    </div>
                    <div class="data-block">
                        <span class="label">Secondary Signature (B)</span>
                        <span class="value" id="tele-b" style="color:var(--red)">Scanning...</span>
                    </div>
                    <div class="data-block">
                        <span class="label">Intersection Coordinates (A ∩ B)</span>
                        <span class="value" id="tele-int" style="color:var(--green)">Waiting for input...</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="top-actions">
                <button class="btn btn-primary nav-btn" id="btn-switch" onclick="switchChannel()">TOGGLE CHANNEL</button>
                <button class="btn btn-primary nav-btn" id="btn-analyze" style="color:var(--gold); border-color:var(--gold);" onclick="performDeepAnalysis()">ANALYZE</button>
                <button class="btn btn-primary nav-btn" id="btn-time" style="color:var(--green); border-color:var(--green);" onclick="readTime()">VOICE TIME</button>
            </div>

            <div class="grid-keypad">
                <button class="btn btn-sci nav-btn" onclick="input('abs(')">|X|</button>
                <button class="btn btn-sci nav-btn" onclick="input('sqrt(')">√</button>
                <button class="btn btn-sci nav-btn" onclick="input('^2')">X²</button>
                <button class="btn btn-ac nav-btn" onclick="clearData()">AC</button>

                <button class="btn nav-btn" onclick="input('x')" style="color:var(--cyan); font-size:1.4rem;">X</button>
                <button class="btn nav-btn" onclick="input('^')">^</button>
                <button class="btn nav-btn" onclick="input('^3')">X³</button>
                <button class="btn btn-op nav-btn" onclick="input('/')">÷</button>

                <button class="btn nav-btn" onclick="input('7')">7</button>
                <button class="btn nav-btn" onclick="input('8')">8</button>
                <button class="btn nav-btn" onclick="input('9')">9</button>
                <button class="btn btn-op nav-btn" onclick="input('*')">×</button>

                <button class="btn nav-btn" onclick="input('4')">4</button>
                <button class="btn nav-btn" onclick="input('5')">5</button>
                <button class="btn nav-btn" onclick="input('6')">6</button>
                <button class="btn btn-op nav-btn" onclick="input('-')">−</button>

                <button class="btn nav-btn" onclick="input('1')">1</button>
                <button class="btn nav-btn" onclick="input('2')">2</button>
                <button class="btn nav-btn" onclick="input('3')">3</button>
                <button class="btn btn-op nav-btn" onclick="input('+')">+</button>

                <button class="btn nav-btn" onclick="input('0')">0</button>
                <button class="btn nav-btn" onclick="input('.')">.</button>
                <button class="btn nav-btn" onclick="input('(')">(</button>
                <button class="btn nav-btn" onclick="input(')')">)</button>
            </div>
        </div>

    </div>

<script>
    /**
     * ========================================================================
     * IMPERIUM ANALYTICAL CORE v25.0: THE PRECISION MODULE
     * ========================================================================
     */

    let expA = "";
    let expB = "";
    let activeCh = 'A';
    const synth = window.speechSynthesis;
    
    // UI Refs
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const clockEl = document.getElementById('chrono-clock');
    
    // Grid Nav Data
    let navIndex = 0;
    const navElements = document.querySelectorAll('.nav-btn');

    // --- INITIALIZATION ---
    window.addEventListener('DOMContentLoaded', () => {
        initClock();
        initCanvas();
        window.addEventListener('resize', initCanvas);
        navElements[0].focus();
        announce("Precision Engine Active. Awaiting Geometry.");
        
        // COORDINATE TOUCH LISTENER
        document.getElementById('canvas-frame').addEventListener('click', (e) => handleCanvasClick(e));
    });

    // --- CHRONOS & VOICE ---
    function initClock() {
        setInterval(() => {
            const d = new Date();
            clockEl.innerText = "TIME: " + d.toLocaleTimeString('en-GB', { hour12: false });
        }, 1000);
    }

    function announce(text) {
        if (!synth) return;
        synth.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.1; 
        msg.pitch = 0.9;
        synth.speak(msg);
    }

    function readTime() {
        const t = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });
        announce("System Time is " + t);
    }

    // --- CANVAS INTERACTION (THE "EXACT COORDINATE" FIX) ---
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        
        // Convert screen X to mathematical X
        const mathX = (mouseX / rect.width) * 20 - 10;
        
        // Evaluate the active expression at this X
        const activeExpr = activeCh === 'A' ? expA : expB;
        if (!activeExpr) {
            announce("No function detected on active channel.");
            return;
        }

        const mathY = calculate(activeExpr, mathX);
        const type = identifyType(activeExpr);

        if (!isNaN(mathY)) {
            // Dictate exact coordinate
            const voiceStr = `Coordinate. X ${mathX.toFixed(2)}, Y ${mathY.toFixed(2)}. ${type}.`;
            announce(voiceStr);
            
            // Draw temporary marker
            draw();
            ctx.beginPath();
            ctx.arc(mouseX, rect.height/2 - (mathY * (rect.height/20)), 6, 0, Math.PI*2);
            ctx.fillStyle = activeCh === 'A' ? "#00e5ff" : "#ff4757";
            ctx.fill();
        }
    }

    // --- GRID NAVIGATION ---
    window.addEventListener('keydown', (e) => {
        const total = navElements.length;
        if (e.key === "ArrowRight") navIndex = (navIndex + 1) % total;
        if (e.key === "ArrowLeft") navIndex = (navIndex - 1 + total) % total;
        
        // Optimized vertical jumping for 4-col grid
        if (e.key === "ArrowDown") {
            if (navIndex < 3) navIndex = 3;
            else navIndex = (navIndex + 4) % total;
        }
        if (e.key === "ArrowUp") {
            if (navIndex >= 3 && navIndex <= 6) navIndex = 0;
            else if (navIndex > 6) navIndex = (navIndex - 4 + total) % total;
        }

        if (["ArrowRight", "ArrowLeft", "ArrowUp", "ArrowDown"].includes(e.key)) {
            e.preventDefault();
            navElements[navIndex].focus();
        }

        // Direct Typing Logic
        if (e.key === "Backspace") clearData();
        else if (e.key.length === 1 && /[0-9x+\-*/().^|]/.test(e.key)) {
            let k = e.key; if(k === '|') k = 'abs('; input(k);
        }
    });

    // --- GRAPHING CORE ---
    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const r = canvas.getBoundingClientRect();
        canvas.width = r.width * dpr;
        canvas.height = r.height * dpr;
        ctx.scale(dpr, dpr);
        draw();
    }

    function switchChannel() {
        activeCh = (activeCh === 'A') ? 'B' : 'A';
        document.getElementById('card-a').classList.toggle('card-active', activeCh === 'A');
        document.getElementById('card-b').classList.toggle('card-active', activeCh === 'B');
        announce("Switched to " + (activeCh === 'A' ? "Channel Alpha" : "Channel Beta"));
    }

    function input(val) {
        if (activeCh === 'A') expA += val; else expB += val;
        updateUI();
        draw();
    }

    function clearData() {
        if (activeCh === 'A') expA = ""; else expB = "";
        updateUI();
        draw();
        announce("Buffer cleared.");
    }

    function updateUI() {
        const f = (s) => s ? s.replace(/sqrt\(/g, '√(').replace(/\*/g, '·') : "0";
        document.getElementById('disp-a').innerText = "y = " + f(expA);
        document.getElementById('disp-b').innerText = "y = " + f(expB);
    }

    /**
     * PRECISION MATH PARSER
     * Handles coefficients (e.g., -5x^2) and negative signs properly.
     */
    function calculate(raw, x) {
        if (!raw) return 0;
        let s = raw.toLowerCase().replace(/\s+/g, '').replace(/\^/g, '**');
        s = s.replace(/abs\(/g, 'Math.abs(').replace(/sqrt\(/g, 'Math.sqrt(');
        
        // Multi-coefficient engine
        s = s.replace(/(\d)(x)/g, "$1*$2");
        s = s.replace(/(\d)(\()/g, "$1*$2");
        s = s.replace(/(\))(x)/g, "$1*$2");
        s = s.replace(/(\))(Math)/g, "$1*$2");
        s = s.replace(/(\d)(Math)/g, "$1*$2");
        
        // Edge case: Handle -x correctly
        if (s.startsWith('-x')) s = s.replace('-x', '-1*x');
        s = s.replace(/x/g, `(${x})`);
        
        try { return eval(s); } catch(e) { return NaN; }
    }

    function draw() {
        const r = canvas.getBoundingClientRect();
        const w = r.width, h = r.height;
        const sX = w / 20, sY = h / 20;

        ctx.clearRect(0,0,w,h);
        
        // Sub-grid
        ctx.strokeStyle = "rgba(255,255,255,0.03)";
        ctx.lineWidth = 1;
        for(let i=-10; i<=10; i++) {
            let px = (i+10)*sX; ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,h); ctx.stroke();
            let py = (i+10)*sY; ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(w,py); ctx.stroke();
        }

        // Main Axes
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke();

        renderPath(expA, "#00e5ff", w, h, sX, sY);
        renderPath(expB, "#ff4757", w, h, sX, sY);
        
        telemetryUpdate();
    }

    function renderPath(expr, color, w, h, sX, sY) {
        if (!expr) return;
        ctx.strokeStyle = color; ctx.lineWidth = 3;
        ctx.beginPath();
        let first = true;
        // Resolution of 300 points for smoothness
        for(let px=0; px<=w; px++) {
            let mx = (px/w)*20 - 10;
            let my = calculate(expr, mx);
            let py = h/2 - (my * sY);
            if(!isNaN(my) && Math.abs(py) < h*5) {
                if(first) { ctx.moveTo(px, py); first = false; }
                else ctx.lineTo(px, py);
            } else first = true;
        }
        ctx.stroke();
    }

    function identifyType(e) {
        if(!e) return "Unknown";
        if(e.includes('abs')) return "Absolute Value";
        if(e.includes('sqrt')) return "Square Root";
        if(e.includes('^2')) return "Quadratic Parabola";
        if(e.includes('^3')) return "Cubic Polynomial";
        if(e.includes('x')) return "Linear Function";
        return "Constant";
    }

    function telemetryUpdate() {
        let yA = calculate(expA, 0);
        let yB = calculate(expB, 0);

        document.getElementById('tele-a').innerText = expA ? `${identifyType(expA)} | Y-Int: ${isNaN(yA)?'None':yA.toFixed(2)}` : "Channel Alpha Idle";
        document.getElementById('tele-b').innerText = expB ? `${identifyType(expB)} | Y-Int: ${isNaN(yB)?'None':yB.toFixed(2)}` : "Channel Beta Idle";

        // Auto-voice identification on function completion
        if((activeCh === 'A' && expA.endsWith(')')) || (activeCh === 'B' && expB.endsWith(')'))) {
            announce("Type identified as " + identifyType(activeCh === 'A' ? expA : expB));
        }
    }

    /**
     * DEEP ANALYSIS: VERBAL DICTATION OF INTERSECTIONS
     */
    function performDeepAnalysis() {
        if(!expA || !expB) {
            announce("Requires dual channels for intersection analysis.");
            return;
        }

        let findings = [];
        let sweepStep = 0.02; // Fine grain sweep
        
        for(let x=-10; x<=10; x+=sweepStep) {
            let diff = calculate(expA, x) - calculate(expB, x);
            // Looking for crossing points where diff is near zero
            if(Math.abs(diff) < 0.1) {
                let y = calculate(expA, x);
                // Check if this point is already found (prevent duplicates in sweep)
                if(findings.length === 0 || Math.abs(findings[findings.length-1].x - x) > 0.5) {
                    findings.push({x: x, y: y});
                }
            }
        }

        if(findings.length === 0) {
            document.getElementById('tele-int').innerText = "No Real Intersections Detected.";
            announce("Analysis complete. No real intersections found in this viewport.");
        } else {
            const listStr = findings.map(p => `(${p.x.toFixed(2)}, ${p.y.toFixed(2)})`).join("  |  ");
            document.getElementById('tele-int').innerText = listStr;
            
            // Dictate results
            let voiceOut = `Analysis complete. Found ${findings.length} intersection. `;
            findings.forEach((p, i) => {
                voiceOut += `Point ${i+1}. X is ${p.x.toFixed(2)}. Y is ${p.y.toFixed(2)}. `;
            });
            announce(voiceOut);
            
            // Highlight findings on canvas
            const r = canvas.getBoundingClientRect();
            findings.forEach(p => {
                let px = (p.x + 10) * (r.width/20);
                let py = r.height/2 - (p.y * (r.height/20));
                ctx.beginPath();
                ctx.arc(px, py, 8, 0, Math.PI*2);
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }
    }

</script>
</body>
</html>
